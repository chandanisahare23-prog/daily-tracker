<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Tracker 3D - Starry Night</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Neumorphic 3D Shadows */
        .neo-shadow {
            box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.5), -4px -4px 10px rgba(255, 255, 255, 0.05);
        }

        .neo-shadow-inset {
            box-shadow: inset 4px 4px 6px rgba(0, 0, 0, 0.3), inset -2px -2px 6px rgba(255, 255, 255, 0.05);
        }

        /* Starry Night Animation */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 3D Inputs */
        input, select {
            background: #e0e5ec !important;
            color: #000 !important;
            border: none !important;
            outline: none !important;
        }

        .btn-3d {
            background: #e0e5ec;
            color: #000;
            transition: all 0.2s ease;
        }

        .btn-3d:active {
            transform: scale(0.95);
            box-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        #offlineMsg {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Offline Message -->
    <div id="offlineMsg">
        <h2 class="text-3xl font-bold mb-2">📶 Internet Required</h2>
        <p class="text-gray-400">Please turn ON internet to use this app</p>
        <button onclick="location.reload()" class="mt-6 px-8 py-3 bg-[#e0e5ec] text-black rounded-xl font-bold">Retry</button>
    </div>

    <div id="mainApp" class="p-4 md:p-8 max-w-5xl mx-auto">
        
        <!-- Ad Space -->
        <div class="h-16 bg-white/5 rounded-xl mb-8 flex items-center justify-center text-[10px] text-gray-600 uppercase tracking-widest">
            Advertisement
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter mb-2 italic">
                DAILY TRACKER <span class="text-[#e0e5ec]">3D</span>
            </h1>
            <p class="text-gray-500 text-xs uppercase tracking-[0.3em]">Starry Night Edition</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Entry Form -->
            <div class="lg:col-span-5">
                <div class="glass-card p-6 rounded-[2.5rem] sticky top-4">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">✨ New Entry</h2>
                    <div class="space-y-4">
                        <input type="date" id="entryDate" class="w-full p-4 rounded-2xl neo-shadow-inset">
                        <input type="text" id="category" placeholder="Category (Food, Rent, etc.)" class="w-full p-4 rounded-2xl neo-shadow-inset">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="amount" placeholder="Amount" class="w-full p-4 rounded-2xl neo-shadow-inset">
                            <select id="type" class="w-full p-4 rounded-2xl neo-shadow-inset appearance-none">
                                <option value="Expense">Expense</option>
                                <option value="Income">Income</option>
                            </select>
                        </div>

                        <input type="text" id="note" placeholder="Note (optional)" class="w-full p-4 rounded-2xl neo-shadow-inset">
                        
                        <button onclick="addEntry()" class="w-full p-4 mt-4 rounded-2xl btn-3d font-black text-lg neo-shadow">ADD ENTRY</button>
                        <button onclick="exportCSV()" class="w-full p-4 rounded-2xl btn-3d font-bold text-md neo-shadow flex items-center justify-center gap-2">
                            📁 EXPORT FILE
                        </button>
                    </div>
                </div>
            </div>

            <!-- Stats & List -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Stats Cards -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-[#e0e5ec] p-5 rounded-3xl text-black neo-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500 mb-1">Today's Balance</p>
                        <p id="balanceToday" class="text-2xl font-black">₹0</p>
                        <div class="flex justify-between mt-2 text-[9px] font-bold uppercase">
                            <span class="text-green-700" id="incomeToday">In: ₹0</span>
                            <span class="text-red-700" id="expenseToday">Out: ₹0</span>
                        </div>
                    </div>
                    <div class="bg-[#e0e5ec] p-5 rounded-3xl text-black neo-shadow">
                        <p class="text-[10px] uppercase font-bold text-gray-500 mb-1">Month Balance</p>
                        <p id="balanceMonth" class="text-2xl font-black">₹0</p>
                        <div class="flex justify-between mt-2 text-[9px] font-bold uppercase">
                            <span class="text-green-700" id="incomeMonth">In: ₹0</span>
                            <span class="text-red-700" id="expenseMonth">Out: ₹0</span>
                        </div>
                    </div>
                </div>

                <!-- List -->
                <div class="bg-[#e0e5ec] rounded-[2.5rem] neo-shadow overflow-hidden min-h-[400px]">
                    <div class="p-6 border-b border-gray-300 flex justify-between items-center">
                        <h2 class="text-black font-bold text-lg">Month Entries</h2>
                        <span id="entryCount" class="bg-black/10 px-3 py-1 rounded-full text-[10px] font-bold text-black uppercase">0 Total</span>
                    </div>
                    <div id="entriesList" class="max-h-[500px] overflow-y-auto custom-scrollbar divide-y divide-gray-200">
                        <!-- Entries will appear here -->
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer Ad -->
        <div class="h-16 bg-white/5 rounded-xl mt-12 flex items-center justify-center text-[10px] text-gray-600 uppercase tracking-widest">
            Advertisement
        </div>
    </div>

    <script>
        /* --- LOGIC --- */
        let entries = JSON.parse(localStorage.getItem("dailyEntries")) || [];
        
        // Set default date
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

        function save() {
            localStorage.setItem("dailyEntries", JSON.stringify(entries));
            render();
        }

        function addEntry() {
            const date = document.getElementById("entryDate").value;
            const category = document.getElementById("category").value;
            const amount = parseFloat(document.getElementById("amount").value);
            const type = document.getElementById("type").value;
            const note = document.getElementById("note").value;

            if (!date || !category || isNaN(amount)) {
                alert("Bhai, sab kuch sahi se bharo!");
                return;
            }

            entries.unshift({ id: Date.now(), date, category, amount, type, note });
            
            // Reset fields
            document.getElementById("category").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("note").value = "";
            
            save();
        }

        function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            save();
        }

        function render() {
            const list = document.getElementById("entriesList");
            list.innerHTML = "";
            
            const today = new Date().toISOString().split('T')[0];
            const currentMonth = today.slice(0, 7);

            let inT = 0, outT = 0, inM = 0, outM = 0;

            entries.forEach(e => {
                const isThisMonth = e.date.slice(0, 7) === currentMonth;
                const isToday = e.date === today;

                if (isThisMonth) {
                    if (e.type === "Income") inM += e.amount; else outM += e.amount;
                    if (isToday) {
                        if (e.type === "Income") inT += e.amount; else outT += e.amount;
                    }

                    // Create Item Card
                    const item = document.createElement("div");
                    item.className = "p-4 flex items-center justify-between hover:bg-white/10 transition-colors";
                    item.innerHTML = `
                        <div class="flex-1 min-w-0 mr-4">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] font-bold text-gray-500">${e.date}</span>
                                <span class="text-[9px] px-1.5 py-0.5 rounded font-bold uppercase ${e.type === 'Income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${e.type}</span>
                            </div>
                            <h3 class="text-black font-bold truncate">${e.category}</h3>
                            <p class="text-gray-500 text-xs truncate">${e.note || ''}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <p class="font-black text-lg ${e.type === 'Income' ? 'text-green-600' : 'text-red-600'}">
                                ${e.type === 'Income' ? '+' : '-'}₹${e.amount}
                            </p>
                            <button onclick="deleteEntry(${e.id})" class="p-2 text-gray-400 hover:text-red-600">❌</button>
                        </div>
                    `;
                    list.appendChild(item);
                }
            });

            // Update Stats
            document.getElementById("incomeToday").innerText = `In: ₹${inT}`;
            document.getElementById("expenseToday").innerText = `Out: ₹${outT}`;
            document.getElementById("balanceToday").innerText = `₹${inT - outT}`;
            document.getElementById("incomeMonth").innerText = `In: ₹${inM}`;
            document.getElementById("expenseMonth").innerText = `Out: ₹${outM}`;
            document.getElementById("balanceMonth").innerText = `₹${inM - outM}`;
            document.getElementById("entryCount").innerText = `${entries.length} Total`;
        }

        function exportCSV() {
            if (entries.length === 0) { alert("Data toh daalo!"); return; }
            let csv = "Date,Category,Type,Amount,Note\n";
            entries.forEach(e => {
                csv += `${e.date},"${e.category}",${e.type},${e.amount},"${e.note}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `DailyTracker_3D_${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => { alert("File Downloaded!"); URL.revokeObjectURL(url); }, 200);
        }

        /* --- STARS --- */
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement("div");
                star.className = "star";
                const size = Math.random() * 3 + 1;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.left = Math.random() * 100 + "vw";
                star.style.top = Math.random() * 100 + "vh";
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + "s");
                star.style.animationDelay = (Math.random() * 5) + "s";
                document.body.appendChild(star);
            }
        }

        /* --- INTERNET CHECK --- */
        function checkNet() {
            if (!navigator.onLine) {
                document.getElementById("mainApp").style.display = "none";
                document.getElementById("offlineMsg").style.display = "flex";
            }
        }

        window.addEventListener("offline", checkNet);
        window.addEventListener("online", () => location.reload());

        // Init
        createStars();
        checkNet();
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Tracker 3D Pro</title>

<style>
/* 🌌 Background & UI Styles */
body { 
  font-family: 'Segoe UI', sans-serif; 
  background: #000;
  padding: 20px; 
  color: #fff;
  overflow-x: hidden;
}

.snowflake {
  position: fixed;
  top: -10px;
  color: #fff;
  font-size: 10px;
  z-index: 9999;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(100vh); }
}

.entry-form { 
  background: rgba(255,255,255,0.08); 
  backdrop-filter: blur(10px);
  border-radius: 20px; 
  padding: 25px; 
  max-width: 500px; 
  margin: 0 auto 30px auto; 
}

.entry-form input, .entry-form select { 
  width: 100%; 
  padding: 15px; 
  margin: 10px 0; 
  border-radius: 12px; 
  border: none; 
  background: #e0e5ec; 
  color:#000; 
  font-size: 16px; 
  box-shadow: inset 4px 4px 6px #a3b1c6, inset -4px -4px 6px #ffffff;
}

.btn { 
  width: 100%; 
  padding: 15px; 
  margin-top: 10px; 
  font-size: 18px; 
  border-radius: 15px; 
  border: none; 
  background: #e0e5ec; 
  color:#000; 
  cursor: pointer;
  box-shadow: 6px 6px 10px #a3b1c6, -6px -6px 10px #ffffff;
}

table { 
  width: 100%; 
  border-collapse: collapse; 
  max-width: 700px; 
  margin: 0 auto 30px auto; 
  background: #e0e5ec;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 8px 8px 15px #000, -2px -2px 10px #333;
}

th, td { 
  padding: 12px; 
  text-align: left; 
  font-size: 15px; 
  border-bottom: 1px solid #ccc;
  color:#000;
}

.total { 
  font-weight: bold; 
  background: #dfe6ee;
}

h1, h2 { text-align: center; color: #fff; }
</style>
</head>
<body>

<div id="mainApp">
  <h1>Daily Tracker 3D</h1>

  <div class="entry-form">
    <input type="date" id="entryDate" />
    <input type="text" id="category" placeholder="Category (Food, Rent, etc.)" />
    <input type="number" id="amount" placeholder="Amount" />
    
    <select id="type">
      <option value="Income">Income</option>
      <option value="Expense">Expense</option>
    </select>

    <input type="text" id="note" placeholder="Note (optional)" />
    
    <button class="btn" onclick="addEntry()">Add Entry</button>
    <button class="btn" onclick="exportExcel()">📁 Export File</button>
  </div>

  <h2>Month Entries</h2>
  <table id="entriesTable">
    <thead>
      <tr>
        <th>Date</th>
        <th>Cat.</th>
        <th>Type</th>
        <th>Amt</th>
        <th>Del</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr class="total"><td colspan="3">Today Balance:</td><td id="balance" colspan="2">0</td></tr>
      <tr class="total"><td colspan="3">Month Balance:</td><td id="monthBalance" colspan="2">0</td></tr>
    </tfoot>
  </table>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("dailyEntries")) || [];
document.getElementById("entryDate").valueAsDate = new Date();

function saveEntries() {
  localStorage.setItem("dailyEntries", JSON.stringify(entries));
  // MIT App Inventor ko signal bhejna
  if (window.AppInventor) {
    window.AppInventor.setWebViewString("Saved:" + entries.length);
  }
}

function addEntry() {
  let date = document.getElementById("entryDate").value;
  let category = document.getElementById("category").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let type = document.getElementById("type").value;
  let note = document.getElementById("note").value;

  if (!date || !category || isNaN(amount)) {
    alert("Please fill required fields!");
    return;
  }

  entries.push({ date, category, amount, type, note });
  saveEntries();
  renderTable();

  document.getElementById("category").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("note").value = "";
}

function deleteEntry(index){
  entries.splice(index,1);
  saveEntries();
  renderTable();
}

function exportExcel(){
  let csv = "Date,Category,Type,Amount,Note\n";
  entries.forEach(e=>{
    csv += `${e.date},${e.category},${e.type},${e.amount},${e.note}\n`;
  });

  // MIT App Inventor Bridge
  if (window.AppInventor) {
      window.AppInventor.setWebViewString("export:" + csv);
  } else {
      // Normal Browser download
      let blob = new Blob([csv],{type:"text/csv"});
      let a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "DailyTracker.csv";
      a.click();
  }
}

function renderTable() {
  let tbody = document.querySelector("#entriesTable tbody");
  tbody.innerHTML = "";
  let incomeToday = 0, expenseToday = 0, monthIncome = 0, monthExpense = 0;
  let today = new Date().toISOString().split('T')[0];
  let currentMonth = today.slice(0,7);

  entries.forEach((e,index) => {
    if (e.date.slice(0,7) === currentMonth) {
      let tr = document.createElement("tr");
      if (e.date === today) tr.style.backgroundColor = "#d0f0c0";
      tr.innerHTML = `<td>${e.date.slice(5)}</td><td>${e.category}</td><td>${e.type[0]}</td><td>${e.amount}</td><td><button onclick="deleteEntry(${index})">x</button></td>`;
      tbody.appendChild(tr);

      if (e.type === "Income") monthIncome += e.amount; else monthExpense += e.amount;
      if (e.date === today) {
        if (e.type === "Income") incomeToday += e.amount; else expenseToday += e.amount;
      }
    }
  });

  document.getElementById("balance").innerText = (incomeToday - expenseToday).toFixed(2);
  document.getElementById("monthBalance").innerText = (monthIncome - monthExpense).toFixed(2);
}

renderTable();

// Snow Effect
setInterval(()=>{
  const s = document.createElement("div");
  s.className = "snowflake";
  s.innerHTML = "❄";
  s.style.left = Math.random()*window.innerWidth+"px";
  s.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),4000);
},300);
</script>

</body>
</html>
